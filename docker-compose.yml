services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
    volumes:
      - storage_data:/app/storage
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker.main
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.bot.main
    env_file:
      - .env
    depends_on:
      - api
      - postgres
      - redis
    volumes:
      - storage_data:/app/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tryonlab
      POSTGRES_USER: tryonlab
      POSTGRES_PASSWORD: tryonlab
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    profiles: ['storage']
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-mc:
    image: minio/mc:latest
    profiles: ['storage']
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123}; do sleep 2; done &&
      mc mb --ignore-existing local/tryonlab &&
      mc ls local/tryonlab
      "

volumes:
  postgres_data:
  storage_data:
  minio_data:
